services:
  - type: web
    name: zenitsu-garage
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: zenitsu-data
      mountPath: /data
      sizeGB: 1
